        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        details > summary { list-style: none; }

            background-repeat: no-repeat;
            background-position: right 0.35rem center;
            background-size: 0.7rem;
        }
        /* ---- Neon styling ---- */
        @keyframes neonFlicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            94% { opacity: 0.78; }
            96% { opacity: 1; }
        }
        .neon-title {
            color: #fff;
            text-shadow:
                0 0 6px rgba(251,191,36,0.95),
                0 0 14px rgba(245,158,11,0.8),
                0 0 30px rgba(249,115,22,0.6),
                0 0 50px rgba(239,68,68,0.45);

        }
        .neon-blue {
            text-shadow: 0 0 8px rgba(59,130,246,0.9), 0 0 20px rgba(59,130,246,0.6);
        }
        .neon-red {
            text-shadow: 0 0 8px rgba(239,68,68,0.9), 0 0 20px rgba(239,68,68,0.6);
        }
        .neon-amber {
            text-shadow: 0 0 6px rgba(251,191,36,0.9), 0 0 16px rgba(245,158,11,0.6);
        }
        .neon-line {
            background: linear-gradient(90deg, #ef4444, #f97316, #fbbf24, #3b82f6, #ef4444);
            background-size: 300% 100%;
            animation: neonSlide 6s linear infinite;
            box-shadow: 0 0 12px rgba(249,115,22,0.7);
        }
        @keyframes neonSlide {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        .car-hero {
            filter: drop-shadow(0 6px 14px rgba(0,0,0,0.6));
        }

        function getCategoryById(id) {
            if (id.startsWith('h')) return 'hyper';
            if (id.startsWith('la')) return 'lmp2am';
            if (id.startsWith('l')) return 'lmp2';
            if (id.startsWith('g')) return 'lmgt3';
            return '';
        }

        function encodeState(obj) {
            const bytes = new TextEncoder().encode(JSON.stringify(obj));
            let bin = '';
            bytes.forEach(b => bin += String.fromCharCode(b));
            return btoa(bin);
        }

        function decodeState(b64) {
            const bin = atob(b64);
            const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
            return JSON.parse(new TextDecoder().decode(bytes));
        }

        function sanitizeState(raw) {
            raw = (raw && typeof raw === 'object') ? raw : {};
            const points = {};
            for (let i = 1; i <= 10; i++) {
                const v = parseInt(raw.points && raw.points[i], 10);
                points[i] = Number.isFinite(v) ? v : DEFAULT_POINTS[i];
            }
            const hist = (raw.history && typeof raw.history === 'object') ? raw.history : {};
            const jokers = (raw.jokers && typeof raw.jokers === 'object') ? raw.jokers : {};
            return {
                assignments: (raw.assignments && typeof raw.assignments === 'object') ? raw.assignments : {},
                positions: (raw.positions && typeof raw.positions === 'object') ? raw.positions : {},

                    Jasper: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'', ...(jokers.Jasper || {}) },

        function triggerLottery() {
            if (Object.keys(state.assignments).length > 0 && !confirm("Opnieuw loten? Huidige teams en jokers gaan verloren.")) return;
            state.assignments = {};
            state.jokers = { Jasper: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'' }, Wilfried: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'' } };
            
            Object.keys(TEAMS).forEach(cat => {
                let pool = [...TEAMS[cat]];
                let jC = 0; let wC = 0;
                if (cat === 'hyper') {
                    if (Math.random() > 0.5) { state.assignments['h1'] = 'Jasper'; state.assignments['h2'] = 'Wilfried'; }
                    else { state.assignments['h1'] = 'Wilfried'; state.assignments['h2'] = 'Jasper'; }
                    jC = 1; wC = 1; pool = pool.filter(t => !t.isToyota);
                }
                pool.sort(() => Math.random() - 0.5).forEach(team => {
                    if (jC < 5) { state.assignments[team.id] = 'Jasper'; jC++; }
                    else { state.assignments[team.id] = 'Wilfried'; wC++; }
                });
            });
            saveToLocalStorage(); renderLists(); calculateScores(); updateChart();
            showToast("🎲 Loting voltooid! Exact 50/50 verdeeld.");
        }

        function calculateScores() {
            let j = 0; let w = 0;
            Object.keys(state.positions).forEach(id => {
                let pos = state.positions[id];
                let pnt = state.points[pos] || 0;
                let cat = getCategoryById(id);
                
                if (state.assignments[id] === 'Jasper') {
                    let mult = (state.jokers.Jasper[cat] === id) ? 2 : 1;
                    j += (pnt * mult);
                }
                if (state.assignments[id] === 'Wilfried') {
                    let mult = (state.jokers.Wilfried[cat] === id) ? 2 : 1;
                    w += (pnt * mult);
                }
            });
            document.getElementById('score-jasper').innerText = j;
            document.getElementById('score-wilfried').innerText = w;
            return { Jasper: j, Wilfried: w };
        }

            if (new Date() >= JOKER_DEADLINE) {
                showToast("🔒 De deadline is verstreken! Jokers zijn bevroren.", "error");

            state.jokers[player][cat] = teamId;

        function importClassOrder(cat) {
            const input = prompt(`Voer de autonummers in (gescheiden door spaties):\nBijv: 7 50 15 8`);
            if (!input) return;
            const numbers = input.match(/\d+/g);
            if (!numbers) return;
            processNumbersToPositions(cat, numbers);
        }

        function scrapeFromWebsiteText(cat) {
            const input = prompt(`Kopieer ALLE tekst van de live timing site en plak het hier:`);
            if (!input) return;
            let foundTeams = [];
            TEAMS[cat].forEach(team => {
                const regex = new RegExp('(?:#|\\b)' + team.num + '\\b');
                const match = input.match(regex);
                if (match) {
                    foundTeams.push({ id: team.id, index: match.index });
                }
            });
            foundTeams.sort((a, b) => a.index - b.index);
            const orderedNumbers = foundTeams.map(f => TEAMS[cat].find(t => t.id === f.id).num);
            processNumbersToPositions(cat, orderedNumbers);
            showToast(`🤖 Tekst verwerkt voor ${cat.toUpperCase()}! Controleer de volgorde.`);
        }

        function processNumbersToPositions(cat, numbers) {
            TEAMS[cat].forEach(team => { state.positions[team.id] = '-'; });
            let rank = 1;
            numbers.forEach(num => {
                const team = TEAMS[cat].find(t => t.num === num);
                if (team && rank <= 10) {
                    state.positions[team.id] = rank.toString();
                    rank++;
                }
            });
            saveToLocalStorage(); renderLists(); calculateScores(); updateChart();
        }

        function applySelectStyling(id, val) {

            if (val == '1') el.classList.add('border-amber-400', 'text-amber-400', 'bg-amber-950/30');
            else if (val == '2') el.classList.add('border-slate-300', 'text-slate-300', 'bg-slate-800');
            else if (val == '3') el.classList.add('border-amber-700', 'text-amber-600', 'bg-amber-900/20');
            else if (val == 'DNF') el.classList.add('border-red-600', 'text-red-500', 'bg-red-950/30');
            else el.classList.add('border-slate-700', 'text-slate-100');
        }

            try {

                const poolState = { ...state, program: {} };
                const encoded = encodeURIComponent(encodeState(poolState));
                const shareUrl = `${window.location.origin}${window.location.pathname}?state=${encoded}`;
                navigator.clipboard.writeText(shareUrl)
                    .then(() => showToast("🔗 Pool-link gekopieerd!"))
                    .catch(() => prompt("Kopieer handmatig:", shareUrl));
            } catch (e) { showToast("Fout bij genereren", "error"); }

        function importSyncLink() {
            const text = prompt("Plak hier de Pool-Link:");
            if (!text) return;
            try {
                let str = text.trim();
                if (str.includes('state=')) { str = str.split('state=')[1].split('&')[0]; }
                try { str = decodeURIComponent(str); } catch (e) { /* al gedecodeerd */ }
                const incoming = sanitizeState(decodeState(str));
                incoming.program = state.program; // eigen programma behouden
                state = incoming;
                saveToLocalStorage(); renderLists(); renderPointsSettings(); renderProgram(); calculateScores(); updateFooterPoints(); updateChart();
                showToast("☁️ Pool & reglement geïmporteerd!", "info");
            } catch (e) { showToast("Ongeldige link", "error"); }
        }

            event:   { chip: 'bg-slate-600/30 text-slate-300 border-slate-500/40',      bar: 'bg-slate-500/90 border-slate-300 text-slate-950' },
            travel:  { chip: 'bg-teal-500/15 text-teal-300 border-teal-500/40',         bar: 'bg-teal-600/80 border-teal-300 text-teal-50 border-dashed' }
        };
        const PLABEL = { race: 'Race', support: 'Support', concert: 'Concert', event: 'Event', travel: 'Reistijd' };

        function toMin(hhmm) { const [h, m] = hhmm.split(':').map(Number); return h * 60 + m; }
        function fmtMin(m) { return pad(Math.floor(m / 60)) + ':' + pad(m % 60); }

        function findProgramItem(id) {
            for (const day of Object.values(PROGRAM)) {
                const it = day.items.find(i => i.id === id);
                if (it) return it;
            }
            return null;
        }

        function selectProgramDay(day) { currentProgramDay = day; renderProgram(); }

        function toggleProgramItem(id) {
            if (state.program[id]) {
                delete state.program[id];
            } else {
                const it = findProgramItem(id);
                if (it) state.program[id] = { s: it.t1, e: it.t2, travel: 0 };
            }
            saveToLocalStorage(); renderProgram();
        }

        function updateProgramTime(id, field, val) {
            if (!state.program[id] || !val) return;
            state.program[id][field] = val;
            saveToLocalStorage(); renderProgram();
        }

        function updateProgramTravel(id, val) {
            if (!state.program[id]) return;
            let m = parseInt(val, 10);
            state.program[id].travel = Number.isFinite(m) && m > 0 ? m : 0;
            saveToLocalStorage(); renderProgram();
        }

        // Verdeel overlappende blokken over kolommen (kalender-stijl)
        function packEvents(evts) {
            evts.sort((a, b) => a.s - b.s || a.e - b.e);
            let groups = [], cur = [], curEnd = -1;
            evts.forEach(ev => {
                if (cur.length && ev.s >= curEnd) { groups.push(cur); cur = []; curEnd = -1; }
                cur.push(ev); curEnd = Math.max(curEnd, ev.e);
            });
            if (cur.length) groups.push(cur);
            groups.forEach(g => {
                let colsEnd = [];
                g.forEach(ev => {
                    let placed = false;
                    for (let i = 0; i < colsEnd.length; i++) {
                        if (ev.s >= colsEnd[i]) { ev.col = i; colsEnd[i] = ev.e; placed = true; break; }
                    }
                    if (!placed) { ev.col = colsEnd.length; colsEnd.push(ev.e); }
                });
                g.forEach(ev => ev.cols = colsEnd.length);
            });
            return evts;
        }

        function buildCalendar(dayItems) {
            // dayItems: [{item, s, e, travel}] met s/e in minuten (e kan na middernacht zijn)
            const allDay = [], timed = [];
            dayItems.forEach(d => {
                let e = d.e;
                if (e <= d.s) e += 1440; // loopt door na middernacht
                const dur = e - d.s;
                if (dur >= 360) allDay.push({ ...d, e });
                else timed.push({ ...d, s: d.s, e: Math.max(e, d.s + 18) });
                // Reistijd-blok vóór het onderdeel
                if (d.travel && d.travel > 0) {
                    timed.push({ item: { l: '🚗 Reistijd → ' + d.item.l.replace(/^[^\wÀ-ÿ]+/, ''), k: 'travel' }, s: d.s - d.travel, e: d.s });
                }
            });

            let allDayHtml = '';
            if (allDay.length) {
                allDayHtml = `<div class="flex flex-wrap gap-1.5 mb-3">` + allDay.map(d => {
                    const c = PCOL[d.item.k];
                    const eDisp = d.e >= 1440 ? d.e - 1440 : d.e;
                    return `<span class="text-3xs px-2 py-1 rounded-lg border font-bold ${c.chip}">${d.item.l} <span class="opacity-70 font-mono">${fmtMin(d.s)}–${fmtMin(eDisp)}</span></span>`;
                }).join('') + `</div>`;
            }

            if (!timed.length) {
                return allDayHtml + (allDay.length ? '' : `<div class="text-2xs text-slate-500 italic py-6 text-center">Nog niets toegevoegd voor deze dag. Tik hierboven op <span class="text-emerald-400 font-bold">+</span> bij een onderdeel.</div>`);
            }

            const PX = 58; // pixels per uur
            let minS = Math.min(...timed.map(t => t.s));
            let maxE = Math.max(...timed.map(t => t.e));
            let winS = Math.floor(minS / 60) * 60;
            let winE = Math.ceil(maxE / 60) * 60;
            const totalH = (winE - winS) / 60 * PX;

            packEvents(timed);

            let hoursHtml = '';
            for (let m = winS; m <= winE; m += 60) {
                const top = (m - winS) / 60 * PX;
                hoursHtml += `
                    <div class="absolute left-0 right-0 border-t border-slate-800" style="top:${top}px">
                        <span class="absolute -top-2 left-0 text-3xs font-mono text-slate-500 bg-slate-900 pr-1">${fmtMin(m % 1440)}</span>
                    </div>`;
            }

            let evHtml = timed.map(d => {
                const c = PCOL[d.item.k];
                const top = (d.s - winS) / 60 * PX;
                const h = Math.max((d.e - d.s) / 60 * PX, 22);
                const widthPct = 100 / d.cols;
                const leftPct = d.col * widthPct;
                return `
                    <div class="absolute rounded-lg border px-1.5 py-0.5 overflow-hidden shadow-md ${c.bar}" style="top:${top}px;height:${h}px;left:${leftPct}%;width:calc(${widthPct}% - 3px)">
                        <div class="text-3xs font-mono font-bold leading-none opacity-80">${fmtMin(d.s)}</div>
                        <div class="text-[10px] font-bold leading-tight mt-0.5">${d.item.l}</div>
                    </div>`;
            }).join('');

            return allDayHtml + `
                <div class="relative" style="height:${totalH + 12}px">
                    ${hoursHtml}
                    <div class="absolute top-0 bottom-0" style="left:3rem;right:0">
                        ${evHtml}
                    </div>
                </div>`;
        }

        function renderProgram() {
            const panel = document.getElementById('panel-program');
            if (!panel) return;

            const dayTabs = Object.keys(PROGRAM).map(k => {
                const active = k === currentProgramDay;
                return `<button onclick="selectProgramDay('${k}')" class="flex-1 py-2 rounded-lg text-2xs font-bold transition-colors ${active ? 'bg-amber-500 text-amber-950 shadow' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}">${PROGRAM[k].label.split(' ').slice(0,2).join(' ')}</button>`;
            }).join('');

            const day = PROGRAM[currentProgramDay];

            // Officiële lijst met toevoeg-knoppen + korte omschrijving
            const listHtml = day.items.map(it => {
                const added = !!state.program[it.id];
                const c = PCOL[it.k];
                const tDisp = it.t1 === it.t2 ? it.t1 : `${it.t1}–${it.t2}`;
                return `
                    <div class="flex items-start gap-2 py-2.5 border-t border-slate-800/60 first:border-t-0">
                        <span class="text-3xs font-mono text-slate-400 w-20 shrink-0 pt-0.5">${tDisp}</span>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs font-bold text-slate-100 leading-snug">${it.l}</span>
                                <span class="text-3xs px-1.5 py-0.5 rounded border font-bold ${c.chip}">${PLABEL[it.k]}</span>
                            </div>
                            <div class="text-3xs text-slate-500 leading-snug mt-0.5">${it.d}</div>
                        </div>
                        <button onclick="toggleProgramItem('${it.id}')" class="shrink-0 w-8 h-8 rounded-lg border font-black text-sm flex items-center justify-center transition-colors ${added ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : 'bg-slate-800 border-slate-700 text-slate-400 hover:text-white'}">${added ? '✓' : '+'}</button>
                    </div>`;
            }).join('');

            // Mijn programma (gekozen items voor deze dag)
            const chosen = day.items.filter(it => state.program[it.id])
                .map(it => ({ item: it, s: toMin(state.program[it.id].s), e: toMin(state.program[it.id].e), travel: state.program[it.id].travel || 0 }))
                .sort((a, b) => a.s - b.s);

            const editHtml = chosen.length ? chosen.map(d => {
                const c = PCOL[d.item.k];
                const tv = state.program[d.item.id].travel || 0;
                return `
                    <div class="py-2.5 border-t border-slate-800/60 first:border-t-0">
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-8 rounded-full ${c.bar.split(' ')[0]} shrink-0"></span>
                            <span class="text-xs text-slate-200 flex-1 leading-tight truncate">${d.item.l}</span>
                            <input type="time" value="${state.program[d.item.id].s}" onchange="updateProgramTime('${d.item.id}','s',this.value)" class="bg-slate-950 border border-slate-700 rounded px-1 py-1 text-2xs font-mono text-white outline-none focus:border-amber-500">
                            <span class="text-slate-600 text-2xs">→</span>
                            <input type="time" value="${state.program[d.item.id].e}" onchange="updateProgramTime('${d.item.id}','e',this.value)" class="bg-slate-950 border border-slate-700 rounded px-1 py-1 text-2xs font-mono text-white outline-none focus:border-amber-500">
                            <button onclick="toggleProgramItem('${d.item.id}')" class="shrink-0 w-7 h-7 rounded-lg bg-slate-800 border border-slate-700 text-slate-500 hover:text-red-400 transition-colors">✕</button>
                        </div>
                        <div class="flex items-center gap-2 mt-1.5 pl-3.5">
                            <span class="text-3xs text-teal-400 font-bold">🚗 + Reistijd:</span>
                            <input type="number" min="0" step="5" value="${tv}" onchange="updateProgramTravel('${d.item.id}', this.value)" class="bg-slate-950 border border-slate-700 rounded px-1.5 py-0.5 w-16 text-2xs font-mono text-white outline-none focus:border-teal-500 text-center" placeholder="0">
                            <span class="text-3xs text-slate-500">min vóór aankomst${tv > 0 ? ` — vertrek ${fmtMin(((d.s - tv) % 1440 + 1440) % 1440)}` : ''}</span>
                        </div>
                    </div>`;
            }).join('') : '';

            panel.innerHTML = `
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 flex items-center"><span class="w-2 h-2 rounded-full bg-amber-500 mr-2"></span> Programma 2026</h3>
                    <p class="text-2xs text-slate-500 mb-3">Bron: 24h-lemans.com • tijden in Le Mans-tijd (CEST). Tik op <span class="text-emerald-400 font-bold">+</span> om iets aan je eigen programma toe te voegen.</p>
                    <div class="flex gap-1.5">${dayTabs}</div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg">
                    <div class="text-3xs font-bold uppercase tracking-wider text-slate-400 mb-1">Officieel — ${day.label}</div>
                    ${listHtml}
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg">
                    <div class="flex items-center justify-between mb-3">
                        <div class="text-3xs font-bold uppercase tracking-wider text-amber-400 neon-amber">📅 Mijn programma — ${day.label}</div>
                        <div class="text-3xs text-slate-500 font-mono">${chosen.length} item(s)</div>
                    </div>
                    ${buildCalendar(chosen)}
                </div>

                ${chosen.length ? `
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg">
                    <div class="text-3xs font-bold uppercase tracking-wider text-slate-400 mb-1">⏱️ Tijden & reistijd aanpassen</div>
                    <p class="text-3xs text-slate-500 mb-1">Pas zelf aan wanneer je wilt aankomen of vertrekken, en hoeveel reistijd je nodig hebt.</p>
                    ${editHtml}
                </div>` : ''}

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg">
                    <div class="text-3xs font-bold uppercase tracking-wider text-slate-400 mb-2">📤 Mijn programma delen <span class="text-slate-600 normal-case font-normal">(los van de pool)</span></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="generateProgramLink()" class="bg-amber-600/15 hover:bg-amber-600/25 text-amber-300 border border-amber-500/30 font-bold py-2.5 rounded-xl text-2xs transition-colors">🔗 Kopieer programma</button>
                        <button onclick="importProgramLink()" class="bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 font-bold py-2.5 rounded-xl text-2xs transition-colors">📥 Plak programma</button>
                    </div>
                </div>
            `;
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        function updateRaceTimer() {
            const labelEl = document.getElementById('race-timer-label');
            const valueEl = document.getElementById('race-timer-value');
            const subEl = document.getElementById('race-timer-sub');
            if (!labelEl || !valueEl || !subEl) return;
            const now = new Date();

            if (now < RACE_START) {
                // Aftellen naar de start
                let diff = Math.floor((RACE_START - now) / 1000);
                const d = Math.floor(diff / 86400); diff -= d * 86400;
                const h = Math.floor(diff / 3600); diff -= h * 3600;
                const m = Math.floor(diff / 60); const s = diff - m * 60;
                labelEl.textContent = '⏳ Aftellen naar de start';
                labelEl.className = 'text-3xs uppercase font-bold tracking-[0.3em] text-amber-400 mb-1 neon-amber';
                valueEl.className = 'text-2xl font-black font-mono tracking-wider neon-amber';
                valueEl.textContent = (d > 0 ? d + 'd ' : '') + pad(h) + ':' + pad(m) + ':' + pad(s);
                subEl.textContent = 'Start: za 13 jun 16:00 (Le Mans)';
            } else if (now < RACE_END) {
                // Race bezig: toon verstreken minuten + resterende tijd
                const elapsedMin = Math.floor((now - RACE_START) / 60000);
                const eh = Math.floor(elapsedMin / 60);
                const em = elapsedMin % 60;
                let rem = Math.floor((RACE_END - now) / 1000);
                const rh = Math.floor(rem / 3600); rem -= rh * 3600;
                const rm = Math.floor(rem / 60); const rs = rem - rm * 60;
                labelEl.innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-emerald-500 mr-1 align-middle animate-pulse"></span> Race is bezig';
                labelEl.className = 'text-3xs uppercase font-bold tracking-[0.3em] text-emerald-400 mb-1';
                valueEl.className = 'text-2xl font-black font-mono tracking-wider neon-red';
                valueEl.textContent = elapsedMin + ' min gereden';
                subEl.textContent = `${eh}u ${em}m verstreken • nog ${pad(rh)}:${pad(rm)}:${pad(rs)} te gaan`;
            } else {
                labelEl.textContent = '🏁 Race afgelopen';
                labelEl.className = 'text-3xs uppercase font-bold tracking-[0.3em] text-slate-400 mb-1';
                valueEl.className = 'text-2xl font-black font-mono tracking-wider neon-amber';
                valueEl.textContent = 'Finish';
                subEl.textContent = 'De 24 uur zitten erop!';
            }
        }

        function updateChart() {
            const hrs = state.history.Jasper.length;
            const labels = Array.from({ length: hrs }, (_, i) => `H${i + 1}`);
            document.getElementById('hour-counter').innerText = `Uur ${hrs}/24`;
            
            if (chart) {
                chart.data.labels = labels;
                chart.data.datasets[0].data = state.history.Jasper;
                chart.data.datasets[1].data = state.history.Wilfried;
                chart.update();
            } else {
                const ctx = document.getElementById('scoreChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Jasper',
                                data: state.history.Jasper,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                borderWidth: 3,
                                tension: 0.2,
                                pointRadius: 3
                            },
                            {
                                label: 'Wilfried',
                                data: state.history.Wilfried,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                borderWidth: 3,
                                tension: 0.2,
                                pointRadius: 3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                            x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            }
        }

        // Automatische opstart routine bij laden van pagina
        window.onload = function() {
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) {
                try { state = sanitizeState(JSON.parse(localData)); } catch(e) {}
            }
            const urlParams = new URLSearchParams(window.location.search);
            const stateParam = urlParams.get('state');
            if (stateParam) {
                try {
                    const myProgram = state.program; // eigen programma niet overschrijven door pool-link
                    state = sanitizeState(decodeState(decodeURIComponent(stateParam)));
                    state.program = myProgram;
                } catch(e) {}
            }
            const programParam = urlParams.get('program');
            if (programParam) {
                try {
                    const decoded = decodeState(decodeURIComponent(programParam));
                    if (decoded && typeof decoded.program === 'object') state.program = decoded.program;
                } catch(e) {}
            }
            renderLists();
            renderPointsSettings();
            renderProgram();
            calculateScores();
            updateFooterPoints();
            updateChart();
            updateRaceTimer();
            setInterval(updateRaceTimer, 1000);
        };
    </script>
</body>
</html>
