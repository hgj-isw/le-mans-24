            points: { ...DEFAULT_POINTS }

        function getCategoryById(id) {
            if (id.startsWith('h')) return 'hyper';
            if (id.startsWith('la')) return 'lmp2am';
            if (id.startsWith('l')) return 'lmp2';
            if (id.startsWith('g')) return 'lmgt3';
            return '';
        }

        function encodeState(obj) {
            const bytes = new TextEncoder().encode(JSON.stringify(obj));
            let bin = '';
            bytes.forEach(b => bin += String.fromCharCode(b));
            return btoa(bin);
        }

        function decodeState(b64) {
            const bin = atob(b64);
            const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
            return JSON.parse(new TextDecoder().decode(bytes));
        }

        function sanitizeState(raw) {
            raw = (raw && typeof raw === 'object') ? raw : {};
            const points = {};
            for (let i = 1; i <= 10; i++) {
                const v = parseInt(raw.points && raw.points[i], 10);
                points[i] = Number.isFinite(v) ? v : DEFAULT_POINTS[i];
            }
            const hist = (raw.history && typeof raw.history === 'object') ? raw.history : {};
            const jokers = (raw.jokers && typeof raw.jokers === 'object') ? raw.jokers : {};
            return {
                assignments: (raw.assignments && typeof raw.assignments === 'object') ? raw.assignments : {},
                positions: (raw.positions && typeof raw.positions === 'object') ? raw.positions : {},
                jokers: {
                    Jasper: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'', ...(jokers.Jasper || {}) },
                    Wilfried: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'', ...(jokers.Wilfried || {}) }
                },
                history: {
                    Jasper: Array.isArray(hist.Jasper) ? hist.Jasper.map(Number) : [],
                    Wilfried: Array.isArray(hist.Wilfried) ? hist.Wilfried.map(Number) : []
                },
                points: points
            };
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-red-600' : (type === 'info' ? 'bg-blue-600' : 'bg-purple-600');
            toast.className = `${colors} text-white px-4 py-2 rounded-full shadow-lg text-sm font-semibold tracking-wide toast-animate pointer-events-auto`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        function switchTab(tabId) {
            ['dash', 'hyper', 'lmp2', 'lmp2am', 'lmgt3'].forEach(id => {
                const panel = document.getElementById(`panel-${id}`);
                const tab = document.getElementById(`tab-${id}`);
                const active = id === tabId;
                panel.classList.toggle('hidden', !active);
                tab.classList.toggle('bg-slate-800', active);
                tab.classList.toggle('text-white', active);
                tab.classList.toggle('shadow-inner', active);
                tab.classList.toggle('text-slate-400', !active);
                tab.classList.toggle('hover:bg-slate-800/50', !active);
            });
        }

        function triggerLottery() {
            if (Object.keys(state.assignments).length > 0 && !confirm("Opnieuw loten? Huidige teams en jokers gaan verloren.")) return;
            state.assignments = {};
            state.jokers = { Jasper: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'' }, Wilfried: { hyper:'', lmp2:'', lmp2am:'', lmgt3:'' } };
            
            Object.keys(TEAMS).forEach(cat => {
                let pool = [...TEAMS[cat]];
                let jC = 0; let wC = 0;
                if (cat === 'hyper') {
                    if (Math.random() > 0.5) { state.assignments['h1'] = 'Jasper'; state.assignments['h2'] = 'Wilfried'; }
                    else { state.assignments['h1'] = 'Wilfried'; state.assignments['h2'] = 'Jasper'; }
                    jC = 1; wC = 1; pool = pool.filter(t => !t.isToyota);
                }
                pool.sort(() => Math.random() - 0.5).forEach(team => {
                    if (jC < 5) { state.assignments[team.id] = 'Jasper'; jC++; }
                    else { state.assignments[team.id] = 'Wilfried'; wC++; }
                });
            });
            saveToLocalStorage(); renderLists(); calculateScores(); updateChart();
            showToast("🎲 Loting voltooid! Exact 50/50 verdeeld.");
        }

        function calculateScores() {
            let j = 0; let w = 0;
            Object.keys(state.positions).forEach(id => {
                let pos = state.positions[id];
                let pnt = state.points[pos] || 0;
                let cat = getCategoryById(id);
                
                if (state.assignments[id] === 'Jasper') {
                    let mult = (state.jokers.Jasper[cat] === id) ? 2 : 1;
                    j += (pnt * mult);
                }
                if (state.assignments[id] === 'Wilfried') {
                    let mult = (state.jokers.Wilfried[cat] === id) ? 2 : 1;
                    w += (pnt * mult);
                }
            });
            document.getElementById('score-jasper').innerText = j;
            document.getElementById('score-wilfried').innerText = w;
            return { Jasper: j, Wilfried: w };
        }

        function updateJoker(player, cat, teamId) {
            if (new Date() >= JOKER_DEADLINE) {
                showToast("🔒 De deadline is verstreken! Jokers zijn bevroren.", "error");
                renderLists();
                return;
            }
            state.jokers[player][cat] = teamId;
            saveToLocalStorage(); calculateScores(); renderLists(); updateChart();
            showToast(`🃏 Joker voor ${player} bijgewerkt!`);
        }

        function updatePosition(id, val) {
            state.positions[id] = val;
            saveToLocalStorage(); calculateScores(); applySelectStyling(id, val);
        }

        function renderPointsSettings() {
            const container = document.getElementById('points-inputs-container');
            if (!container) return;
            let html = '';

                        <div class="text-3xs text-slate-500 font-bold mb-0.5">P${i}</div>

                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function updatePointValue(pos, val) {
            state.points[pos] = parseInt(val) || 0;
            saveToLocalStorage(); calculateScores(); updateFooterPoints();

        function updateFooterPoints() {
            const footer = document.getElementById('footer-points');
            if (!footer) return;
            footer.innerHTML = Object.keys(state.points)
                .map(p => `<span>P${p}:<strong class="text-slate-300">${state.points[p]}</strong></span>`)
                .join('');
        }

        function importClassOrder(cat) {
            const input = prompt(`Voer de autonummers in (gescheiden door spaties):\nBijv: 7 50 15 8`);
            if (!input) return;
            const numbers = input.match(/\d+/g);
            if (!numbers) return;
            processNumbersToPositions(cat, numbers);
        }

        function scrapeFromWebsiteText(cat) {
            const input = prompt(`Kopieer ALLE tekst van de live timing site en plak het hier:`);
            if (!input) return;
            let foundTeams = [];
            TEAMS[cat].forEach(team => {
                const regex = new RegExp('(?:#|\\b)' + team.num + '\\b');
                const match = input.match(regex);
                if (match) {
                    foundTeams.push({ id: team.id, index: match.index });
                }
            });
            foundTeams.sort((a, b) => a.index - b.index);
            const orderedNumbers = foundTeams.map(f => TEAMS[cat].find(t => t.id === f.id).num);
            processNumbersToPositions(cat, orderedNumbers);
            showToast(`🤖 Tekst verwerkt voor ${cat.toUpperCase()}! Controleer de volgorde.`);
        }

        function processNumbersToPositions(cat, numbers) {
            TEAMS[cat].forEach(team => { state.positions[team.id] = '-'; });
            let rank = 1;
            numbers.forEach(num => {
                const team = TEAMS[cat].find(t => t.num === num);
                if (team && rank <= 10) {
                    state.positions[team.id] = rank.toString();
                    rank++;
                }
            });
            saveToLocalStorage(); renderLists(); calculateScores(); updateChart();
        }

        function applySelectStyling(id, val) {
            const el = document.getElementById(`select-${id}`);
            if (!el) return;
            el.className = "pos-select bg-slate-900 border appearance-none outline-none rounded-xl py-2.5 pl-2 pr-5 text-xs font-bold w-16 text-center transition-colors shadow-inner min-h-[40px]";
            if (val == '1') el.classList.add('border-amber-400', 'text-amber-400', 'bg-amber-950/30');
            else if (val == '2') el.classList.add('border-slate-300', 'text-slate-300', 'bg-slate-800');
            else if (val == '3') el.classList.add('border-amber-700', 'text-amber-600', 'bg-amber-900/20');
            else if (val == 'DNF') el.classList.add('border-red-600', 'text-red-500', 'bg-red-950/30');
            else el.classList.add('border-slate-700', 'text-slate-100');
        }

        function saveCurrentHour() {
            if (state.history.Jasper.length >= 24) { showToast("Alle 24 uur zijn al gevuld!", "error"); return; }
            let current = calculateScores();
            state.history.Jasper.push(current.Jasper); state.history.Wilfried.push(current.Wilfried);
            saveToLocalStorage(); updateChart();
            showToast(`📈 Uur ${state.history.Jasper.length} opgeslagen!`);
        }

        function saveToLocalStorage() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            catch (e) { showToast("Opslaan mislukt (opslag vol?)", "error"); }
        }

        function resetAll() {
            if (confirm("⚠️ Alles wissen?")) { localStorage.removeItem(STORAGE_KEY); window.location.href = window.location.pathname; }
        }

        function generateShareLink() {
            try {
                const encoded = encodeURIComponent(encodeState(state));
                const shareUrl = `${window.location.origin}${window.location.pathname}?state=${encoded}`;
                navigator.clipboard.writeText(shareUrl)
                    .then(() => showToast("🔗 Sync-link gekopieerd!"))
                    .catch(() => prompt("Kopieer handmatig:", shareUrl));
            } catch (e) { showToast("Fout bij genereren", "error"); }
        }

        function importSyncLink() {
            const text = prompt("Plak hier de Sync-Link:");
            if (!text) return;
            try {
                let str = text.trim();
                if (str.includes('state=')) { str = str.split('state=')[1].split('&')[0]; }
                try { str = decodeURIComponent(str); } catch (e) { /* al gedecodeerd */ }
                state = sanitizeState(decodeState(str));
                saveToLocalStorage(); renderLists(); renderPointsSettings(); calculateScores(); updateFooterPoints(); updateChart();
                showToast("☁️ Data & reglement succesvol geïmporteerd!", "info");
            } catch (e) { showToast("Ongeldige link", "error"); }
        }

        function renderLists() {
            const categories = { hyper: 'panel-hyper', lmp2: 'panel-lmp2', lmp2am: 'panel-lmp2am', lmgt3: 'panel-lmgt3' };
            const now = new Date();
            const deadlinePassed = now >= JOKER_DEADLINE;
            const canChangeJoker = !deadlinePassed && Object.keys(state.assignments).length > 0;

            Object.keys(categories).forEach(cat => {
                const container = document.getElementById(categories[cat]);
                
                // Basis Utilities box
                let html = `
                    <div class="mb-3 bg-slate-900 border border-slate-800 p-2.5 rounded-xl shadow-inner space-y-2">
                        <div class="text-3xs font-bold uppercase tracking-wider text-slate-400 pl-1">Handmatige Updates:</div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="importClassOrder('${cat}')" class="bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-500/20 text-3xs font-bold py-2.5 rounded-lg transition-colors">
                                ⚡ Snel-volgorde
                            </button>
                            <button onclick="scrapeFromWebsiteText('${cat}')" class="bg-purple-600/10 hover:bg-purple-600/20 text-purple-400 border border-purple-500/20 text-3xs font-bold py-2.5 rounded-lg transition-colors">
                                📋 Plak Website
                            </button>
                        </div>
                    </div>
                `;

                // Nieuwe Joker Selectie Box (alleen tonen na de loting)
                if (Object.keys(state.assignments).length > 0) {
                    const jasperPool = TEAMS[cat].filter(t => state.assignments[t.id] === 'Jasper');
                    const wilfriedPool = TEAMS[cat].filter(t => state.assignments[t.id] === 'Wilfried');

                    let jOpts = `<option value="">-- Geen Joker --</option>` + jasperPool.map(t => `<option value="${t.id}" ${state.jokers.Jasper[cat] === t.id ? 'selected' : ''}>#${t.num} ${t.name.split('#')[0].trim()}</option>`).join('');
                    let wOpts = `<option value="">-- Geen Joker --</option>` + wilfriedPool.map(t => `<option value="${t.id}" ${state.jokers.Wilfried[cat] === t.id ? 'selected' : ''}>#${t.num} ${t.name.split('#')[0].trim()}</option>`).join('');

                    html += `
                        <div class="mb-3 bg-slate-900 border border-slate-800 p-2.5 rounded-xl shadow-inner space-y-2">
                            <div class="text-3xs font-bold uppercase tracking-wider text-slate-400 flex justify-between items-center pl-1">
                                <span>🃏 Joker Per Categorie (Pnt x2):</span>
                                <span class="${deadlinePassed ? 'text-red-500' : 'text-amber-500'} font-mono">${deadlinePassed ? '🔒 Gesloten' : '⏳ Tot 13 jun 15:59'}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <div class="text-[9px] text-blue-400 font-bold mb-0.5">Jasper:</div>
                                    <select onchange="updateJoker('Jasper', '${cat}', this.value)" ${!canChangeJoker ? 'disabled' : ''} class="w-full bg-slate-950 border border-slate-700/60 rounded px-1 py-1 text-white outline-none text-3xs font-bold ${!canChangeJoker ? 'opacity-50 cursor-not-allowed' : ''}">
                                        ${jOpts}
                                    </select>
                                </div>
                                <div>
                                    <div class="text-[9px] text-red-400 font-bold mb-0.5">Wilfried:</div>
                                    <select onchange="updateJoker('Wilfried', '${cat}', this.value)" ${!canChangeJoker ? 'disabled' : ''} class="w-full bg-slate-950 border border-slate-700/60 rounded px-1 py-1 text-white outline-none text-3xs font-bold ${!canChangeJoker ? 'opacity-50 cursor-not-allowed' : ''}">
                                        ${wOpts}
                                    </select>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Renderen van de Teams
                TEAMS[cat].forEach(team => {
                    const owner = state.assignments[team.id];
                    const currentPos = state.positions[team.id] || '-';
                    
                    let ownerHtml = `<span class="text-3xs px-2 py-1 rounded-md font-bold bg-slate-800 text-slate-500 border border-slate-700">Niet geloot</span>`;
                    if (owner === 'Jasper') ownerHtml = `<span class="text-3xs px-2 py-1 rounded-md font-black bg-blue-900/40 text-blue-400 border border-blue-800/50">JASPER</span>`;
                    if (owner === 'Wilfried') ownerHtml = `<span class="text-3xs px-2 py-1 rounded-md font-black bg-red-900/40 text-red-400 border border-red-800/50">WILFRIED</span>`;
                    
                    // Is dit team aangewezen als joker?
                    const isJoker = (owner === 'Jasper' && state.jokers.Jasper[cat] === team.id) || (owner === 'Wilfried' && state.jokers.Wilfried[cat] === team.id);
                    let jokerBadge = isJoker ? `<span class="text-3xs px-1.5 py-1 rounded-md font-black bg-amber-500/20 text-amber-400 border border-amber-500/40 tracking-wider animate-pulse">🃏 JOKER X2</span>` : '';

                    let optionsHtml = `<option value="-">-</option>`;
                    for (let i = 1; i <= 10; i++) optionsHtml += `<option value="${i}" ${currentPos == i ? 'selected' : ''}>P${i}</option>`;
                    optionsHtml += `<option value="DNF" ${currentPos === 'DNF' ? 'selected' : ''}>DNF</option>`;
                    
                    let driversHtml = team.drivers.map(d => `
                        <div class="flex items-center space-x-2 py-0.5">
                            <img src="https://flagcdn.com/16x12/${d.cc}.png" alt="${d.cc}" class="w-4 h-3 rounded-[2px] shadow-sm bg-slate-800 object-cover" loading="lazy">
                            <span class="text-slate-500 font-mono tracking-wider text-[10px]">[${d.cc.toUpperCase()}]</span>
                            <span class="text-slate-300 font-medium">${d.n}</span>
                        </div>
                    `).join('');

                    html += `
                        <div class="flex items-start justify-between bg-slate-900/80 border border-slate-800 rounded-2xl p-3.5 backdrop-blur-sm">
                            <div class="flex-1 pr-3">
                                <div class="text-sm font-bold text-slate-100 leading-tight">${team.name}</div>
                                <div class="flex items-center space-x-2 mt-2">
                                    ${ownerHtml} ${jokerBadge} <span class="text-3xs text-slate-500 font-mono">${team.car}</span>
                                </div>
                                <details class="mt-2 group cursor-pointer">
                                    <summary class="text-3xs font-semibold text-slate-500 hover:text-slate-300 flex items-center select-none transition-colors py-1">
                                        <svg class="w-3 h-3 mr-1 transition-transform duration-200 group-open:rotate-90 text-slate-600 group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                        Toon coureurs
                                    </summary>
                                    <div class="pl-4 mt-1.5 space-y-0.5 text-3xs text-slate-400">
                                        ${driversHtml}
                                    </div>
                                </details>
                            </div>
                            <div class="pt-0.5">
                                <select id="select-${team.id}" onchange="updatePosition('${team.id}', this.value)">
                                    ${optionsHtml}
                                </select>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
            Object.keys(TEAMS).forEach(cat => {
                TEAMS[cat].forEach(team => applySelectStyling(team.id, state.positions[team.id] || '-'));
            });
        }

        function updateChart() {
            const hrs = state.history.Jasper.length;
            const labels = Array.from({ length: hrs }, (_, i) => `H${i + 1}`);
            document.getElementById('hour-counter').innerText = `Uur ${hrs}/24`;
            
            if (chart) {
                chart.data.labels = labels;
                chart.data.datasets[0].data = state.history.Jasper;
                chart.data.datasets[1].data = state.history.Wilfried;
                chart.update();
            } else {
                const ctx = document.getElementById('scoreChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Jasper',
                                data: state.history.Jasper,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                borderWidth: 3,
                                tension: 0.2,
                                pointRadius: 3
                            },
                            {
                                label: 'Wilfried',
                                data: state.history.Wilfried,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                borderWidth: 3,
                                tension: 0.2,
                                pointRadius: 3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                            x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            }
        }

        // Automatische opstart routine bij laden van pagina
        window.onload = function() {
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) {
                try { state = sanitizeState(JSON.parse(localData)); } catch(e) {}
            }
            const urlParams = new URLSearchParams(window.location.search);
            const stateParam = urlParams.get('state');
            if (stateParam) {
                try { state = sanitizeState(decodeState(decodeURIComponent(stateParam))); } catch(e) {}
            }
            renderLists();
            renderPointsSettings();
            calculateScores();
            updateFooterPoints();
            updateChart();
        };
    </script>
</body>
</html>
